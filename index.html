<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página Animada</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(270deg, #6a11cb, #2575fc);
    background-size: 400% 400%;
    animation: fundoAnimado 10s ease infinite;
    color: white;
    text-align: center;
  }

  /* Animação do fundo */
  @keyframes fundoAnimado {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .container {
    margin-top: 100px;
  }

  h1 {
    font-size: 40px;
    animation: aparecer 2s ease-in-out;
  }

  p {
    font-size: 18px;
    animation: aparecer 3s ease-in-out;
  }

  /* Animação de entrada */
  @keyframes aparecer {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .botao {
    margin-top: 30px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: #fff;
    color: #2575fc;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    animation: pulsar 2s infinite;
  }

  .botao:hover {
    background: #ddd;
  }

  /* Animação do botão */
  @keyframes pulsar {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

</style>
</head>

<body>

<div class="container">
  <h1>🔥 Página Animada</h1>
  <p>Exemplo usando CSS @keyframes</p>
  <button class="botao">Clique Aqui</button>
</div>

</body>
</html>
