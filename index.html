<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Avançado</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #050505;
    font-family: Arial, sans-serif;
    color: white;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
  }

  .content {
    position: relative;
    text-align: center;
    top: 40vh;
    z-index: 10;
  }

  h1 {
    font-size: 40px;
  }
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="content">
  <h1>🔥 Efeito Avançado</h1>
  <p>Partículas + ondas + rastro do mouse</p>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let mouseTrail = [];

const mouse = {
  x: null,
  y: null
};

window.addEventListener("mousemove", (e) => {
  mouse.x = e.x;
  mouse.y = e.y;

  mouseTrail.push({ x: mouse.x, y: mouse.y });
  if (mouseTrail.length > 20) mouseTrail.shift();
});

// Partículas
class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 1;
    this.speedX = Math.random() * 1 - 0.5;
    this.speedY = Math.random() * 1 - 0.5;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;

    if (this.x > canvas.width) this.x = 0;
    if (this.x < 0) this.x = canvas.width;
    if (this.y > canvas.height) this.y = 0;
    if (this.y < 0) this.y = canvas.height;
  }

  draw() {
    ctx.fillStyle = "#00ffff";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Inicializar partículas
function init() {
  particles = [];
  for (let i = 0; i < 120; i++) {
    particles.push(new Particle());
  }
}

// Linhas entre partículas
function connect() {
  for (let a = 0; a < particles.length; a++) {
    for (let b = a; b < particles.length; b++) {
      let dx = particles[a].x - particles[b].x;
      let dy = particles[a].y - particles[b].y;
      let dist = dx * dx + dy * dy;

      if (dist < 9000) {
        ctx.strokeStyle = "rgba(0,255,255,0.08)";
        ctx.beginPath();
        ctx.moveTo(particles[a].x, particles[a].y);
        ctx.lineTo(particles[b].x, particles[b].y);
        ctx.stroke();
      }
    }
  }
}

// 🔥 Novo efeito: rastro do mouse
function drawTrail() {
  for (let i = 0; i < mouseTrail.length; i++) {
    let p = mouseTrail[i];
    ctx.fillStyle = `rgba(0,255,255,${i / 20})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// 🔥 Novo efeito: ondas/glow animado
let waveOffset = 0;

function drawWave() {
  ctx.beginPath();
  ctx.strokeStyle = "rgba(0,255,255,0.15)";
  ctx.lineWidth = 2;

  for (let x = 0; x < canvas.width; x++) {
    let y = canvas.height / 2 + Math.sin(x * 0.01 + waveOffset) * 20;
    ctx.lineTo(x, y);
  }

  ctx.stroke();
  waveOffset += 0.03;
}

// Animação principal
function animate() {
  ctx.fillStyle = "rgba(5,5,5,0.3)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.update();
    p.draw();
  });

  connect();
  drawTrail(); // efeito novo
  drawWave();  // efeito novo

  requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  init();
});
</script>

</body>
</html>
