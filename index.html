<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interface Premium</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050505;
  color: white;
  overflow: hidden;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* MENU */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  padding: 20px;
  box-sizing: border-box;
}

.profile {
  text-align: center;
}

.profile img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 2px solid #00ffff;
}

.gradient-text {
  background: linear-gradient(45deg, #00ffff, #0077ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block;
}

/* BOTÕES */
.menu-btn {
  margin-top: 20px;
  padding: 12px;
  background: linear-gradient(45deg, #00ffff, #0077ff);
  color: black;
  border: none;
  width: 100%;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.3s;
}

/* ÍCONE ANIMADO */
.menu-btn .icon {
  margin-right: 10px;
  width: 20px;
  height: 20px;
  border: 2px solid black;
  border-radius: 50%;
  border-left: 4px solid black;
  animation: spin 1s linear infinite;
}

/* SPIN KEYFRAME */
@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

/* HOVER NEON */
.menu-btn:hover {
  box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff inset;
}

/* PAINEL */
.panel {
  position: fixed;
  right: -100%;
  top: 0;
  width: calc(100% - 260px);
  height: 100%;
  background: rgba(10,10,10,0.95);
  padding: 30px;
  box-sizing: border-box;
  transition: right 0.5s;
  overflow-y: auto;
  z-index: 1;
}

.panel.active {
  right: 0;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  counter-reset: card;
}

/* CARDS */
.card {
  position: relative;
  width: 260px;
  height: 218px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  transition: transform 0.3s, box-shadow 0.3s;
  border: 1px solid rgba(0,255,255,0.2);
  display: flex;
  justify-content: center;
  align-items: center;
  box-sizing: border-box;
}

/* NUMERAÇÃO AUTOMÁTICA */
.card::before {
  counter-increment: card;
  content: "#" counter(card);
  position: absolute;
  top: 10px;
  left: 15px;
  font-size: 14px;
  color: #00ffff;
  font-weight: bold;
  background: rgba(0,255,255,0.1);
  padding: 5px 10px;
  border-radius: 10px;
}

/* HOVER */
.card:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(0,255,255,0.4);
}

/* TEXTO */
.card span {
  font-size: 16px;
  text-align: center;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- MENU -->
<div class="sidebar">
  <div class="profile">
    <img src="https://xatimg.com/image/9ED7TkP93b9y.gif" alt="Foto de Perfil">
    <h2 class="gradient-text">iiCarvaozim</h2>
    <p class="gradient-text">Dev • Criador • Designer</p>
  </div>

  <!-- BOTÃO FUNDOS GFS -->
  <button class="menu-btn" onclick="togglePanel(); playSound(); initParticles();">
    <div class="icon" aria-hidden="true"></div>
    FUNDOS GFS
  </button>

  <!-- BOTÃO PCBACK -->
  <button class="menu-btn" onclick="pcBack();">
    <div class="icon" aria-hidden="true"></div>
    PCBACK
  </button>

  <!-- BOTÃO FUNDOS ESTÁTICOS -->
  <button class="menu-btn" onclick="fundosEstáticos();">
    <div class="icon" aria-hidden="true"></div>
    FUNDOS ESTÁTICOS
  </button>
</div>

<!-- PAINEL -->
<div class="panel" id="panel">
  <div class="grid">
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
  </div>
</div>

<script>
// MENU
function togglePanel() {
  document.getElementById("panel").classList.toggle("active");
}

// SOM AO CLICAR
function playSound() {
  const audio = new Audio("https://freesound.org/data/previews/341/341695_6245054-lq.mp3");
  audio.volume = 0.3;
  audio.play();
}

// FUNÇÃO PCBACK
function pcBack() {
  alert("Botão PCBACK clicado!");
  // Aqui você pode adicionar a ação real do PCBACK
}

// FUNÇÃO FUNDOS ESTÁTICOS
function fundosEstáticos() {
  const panel = document.getElementById("panel");
  panel.classList.add("active"); // abre painel se fechado
  resetParticlesStatic();
}

// CANVAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// PARTICULAS
let particles = [];

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 1;
    this.speedX = Math.random() - 0.5;
    this.speedY = Math.random() - 0.5;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x > canvas.width) this.x = 0;
    if (this.x < 0) this.x = canvas.width;
    if (this.y > canvas.height) this.y = 0;
    if (this.y < 0) this.y = canvas.height;
  }
  draw() {
    ctx.fillStyle = "#00ffff";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
  }
}

// INICIA PARTICULAS ANIMADAS
function initParticles(count = 100) {
  particles = [];
  for (let i = 0; i < count; i++) {
    particles.push(new Particle());
  }
}

// PARTICULAS ESTÁTICAS
function resetParticlesStatic(count = 100) {
  particles = [];
  for (let i = 0; i < count; i++) {
    let p = new Particle();
    p.speedX = 0;
    p.speedY = 0;
    particles.push(p);
  }
}

// ANIMAÇÃO
function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}

animateParticles();
</script>

</body>
</html>
