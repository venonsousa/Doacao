<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interface Premium</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050505;
  color: white;
  overflow: hidden;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* MENU LATERAL */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  padding: 20px;
  box-shadow: 2px 0 20px rgba(0,0,0,0.5);
}

.profile {
  text-align: center;
}

.profile img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 2px solid #00ffff;
}

.profile h2 {
  margin: 10px 0 5px;
}

.profile p {
  font-size: 13px;
  color: #aaa;
}

/* BOTÃO MENU */
.menu-btn {
  margin-top: 20px;
  padding: 10px;
  background: #00ffff;
  color: black;
  border: none;
  width: 100%;
  border-radius: 20px;
  cursor: pointer;
}

/* PAINEL DIREITO */
.panel {
  position: fixed;
  right: -100%;
  top: 0;
  width: calc(100% - 260px);
  height: 100%;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(10px);
  padding: 30px;
  transition: 0.5s ease;
  overflow-y: auto;
}

.panel.active {
  right: 0;
}

/* GRID DE CARDS */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

/* CARDS */
.card {
  width: 390px;
  height: 315px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  transition: 0.3s;
  backdrop-filter: blur(5px);
  border: 1px solid rgba(0,255,255,0.2);
  cursor: pointer;
}

.card:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(0,255,255,0.4);
}

/* TEXTO CENTRAL */
.card span {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
  font-size: 18px;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- MENU -->
<div class="sidebar">
  <div class="profile">
    <img src="https://i.pravatar.cc/150" alt="perfil">
    <h2>Seu Nome</h2>
    <p>Desenvolvedor • Criador • Designer</p>
  </div>

  <button class="menu-btn" onclick="togglePanel()">Abrir Menu</button>
</div>

<!-- PAINEL -->
<div class="panel" id="panel">
  <div class="grid">
    <div class="card"><span>Card 1</span></div>
    <div class="card"><span>Card 2</span></div>
    <div class="card"><span>Card 3</span></div>
    <div class="card"><span>Card 4</span></div>
    <div class="card"><span>Card 5</span></div>
    <div class="card"><span>Card 6</span></div>
  </div>
</div>

<script>
// ABRIR MENU
function togglePanel() {
  document.getElementById("panel").classList.toggle("active");
}

// CANVAS (partículas)
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2;
    this.speedX = Math.random() - 0.5;
    this.speedY = Math.random() - 0.5;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;

    if (this.x > canvas.width) this.x = 0;
    if (this.y > canvas.height) this.y = 0;
  }

  draw() {
    ctx.fillStyle = "#00ffff";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function init() {
  particles = [];
  for (let i = 0; i < 100; i++) {
    particles.push(new Particle());
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.update();
    p.draw();
  });

  requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
