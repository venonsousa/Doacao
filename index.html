<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interface Premium</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050505;
  color: white;
  overflow: hidden;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* MENU */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  padding: 20px;
}

.profile {
  text-align: center;
}

.profile img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  border: 2px solid #00ffff;
}

/* BOTÃO FUNDOS GFS */
.menu-btn {
  margin-top: 20px;
  padding: 12px;
  background: linear-gradient(45deg, #00ffff, #0077ff);
  color: black;
  border: none;
  width: 100%;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* ÍCONE ANIMADO */
.menu-btn .icon {
  margin-right: 10px;
  width: 20px;
  height: 20px;
  border: 2px solid black;
  border-radius: 50%;
  border-left: 4px solid black;
  animation: spin 1s linear infinite;
}

/* SPIN KEYFRAME */
@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

/* HOVER NEON */
.menu-btn:hover {
  box-shadow: 0 0 15px #00ffff, 0 0 30px #00ffff inset;
}

/* PAINEL */
.panel {
  position: fixed;
  right: -100%;
  top: 0;
  width: calc(100% - 260px);
  height: 100%;
  background: rgba(10,10,10,0.95);
  padding: 30px;
  transition: 0.5s;
  overflow-y: auto;
}

.panel.active {
  right: 0;
}

/* GRID */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  counter-reset: card;
}

/* CARDS */
.card {
  position: relative;
  width: 260px;
  height: 218px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  transition: 0.3s;
  border: 1px solid rgba(0,255,255,0.2);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* NUMERAÇÃO AUTOMÁTICA */
.card::before {
  counter-increment: card;
  content: "#" counter(card);
  position: absolute;
  top: 10px;
  left: 15px;
  font-size: 14px;
  color: #00ffff;
  font-weight: bold;
  background: rgba(0,255,255,0.1);
  padding: 5px 10px;
  border-radius: 10px;
}

/* HOVER */
.card:hover {
  transform: scale(1.08);
  box-shadow: 0 0 25px rgba(0,255,255,0.4);
}

/* TEXTO */
.card span {
  font-size: 16px;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<!-- MENU -->
<div class="sidebar">
  <div class="profile">
    <img src="https://i.pravatar.cc/150">
    <h2>Seu Nome</h2>
    <p>Dev • Criador • Designer</p>
  </div>

  <!-- BOTÃO COM ÍCONE -->
  <button class="menu-btn" onclick="togglePanel(); playSound();">
    <div class="icon"></div>
    FUNDOS GFS
  </button>
</div>

<!-- PAINEL -->
<div class="panel" id="panel">
  <div class="grid">
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
    <div class="card"><span>Item</span></div>
  </div>
</div>

<script>
// MENU
function togglePanel() {
  document.getElementById("panel").classList.toggle("active");
}

// SOM AO CLICAR
function playSound() {
  const audio = new Audio("https://freesound.org/data/previews/341/341695_6245054-lq.mp3");
  audio.volume = 0.3;
  audio.play();
}

// CANVAS
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2;
    this.speedX = Math.random() - 0.5;
    this.speedY = Math.random() - 0.5;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x > canvas.width) this.x = 0;
    if (this.y > canvas.height) this.y = 0;
  }
  draw() {
    ctx.fillStyle = "#00ffff";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
  }
}

function init() {
  particles = [];
  for(let i=0;i<100;i++){particles.push(new Particle());}
}
function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(animate);
}
init();
animate();
window.addEventListener("resize",()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
</script>

</body>
</html>
